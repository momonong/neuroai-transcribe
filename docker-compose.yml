services:
  db:
    image: postgres:18-alpine
    container_name: neuroai_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - neuroai_pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      tags:
        - "momonong/neuroai-backend:${IMAGE_TAG}"
        - "momonong/neuroai-backend:latest"
    image: momonong/neuroai-backend:${IMAGE_TAG}
    container_name: neuroai_backend
    expose:
      - "8001"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - RUN_PIPELINE_AFTER_UPLOAD=false
      - DATABASE_URL=postgresql+psycopg://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
    working_dir: /app/backend
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  whisper:
    build:
      context: ./models/whisper
      dockerfile: Dockerfile
      tags:
        - "momonong/neuroai-whisper:${IMAGE_TAG}"
        - "momonong/neuroai-whisper:latest"
    image: momonong/neuroai-whisper:${IMAGE_TAG}
    container_name: neuroai_whisper
    expose:
      - "8002"
    volumes:
      - ./data:/app/data
      - whisper_model_cache:/app/models_cache
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - WHISPER_MODEL=large-v3
      - MODEL_CACHE_DIR=/app/models_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  core:
    build:
      context: .
      dockerfile: core/Dockerfile
      tags:
        - "momonong/neuroai-core:${IMAGE_TAG}"
        - "momonong/neuroai-core:latest"
    image: momonong/neuroai-core:${IMAGE_TAG}
    container_name: neuroai_core
    expose:
      - "8003"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - whisper_model_cache:/app/models_cache
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - MODEL_CACHE_DIR=/app/models_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      tags:
        - "momonong/neuroai-frontend:${IMAGE_TAG}"
        - "momonong/neuroai-frontend:latest"
    image: momonong/neuroai-frontend:${IMAGE_TAG}
    container_name: neuroai_frontend
    ports:
      - "55688:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  neuroai_pg_data:
  whisper_model_cache: