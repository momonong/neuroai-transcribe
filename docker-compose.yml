# docker push momonong/neuroai-backend:latest
# docker push momonong/neuroai-frontend:latest
services:
  db:
    image: postgres:18-alpine
    container_name: neuroai_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - neuroai_pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: momonong/neuroai-backend:latest
    container_name: neuroai_backend
    expose:
      - "8001"
    volumes:
      - ./data:/app/data
    # 專案根 .env 變數送進容器；下方 environment 同名項會覆寫（DATABASE_URL 仍指向 db:5432）
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - RUN_PIPELINE_AFTER_UPLOAD=false
      - DATABASE_URL=postgresql+psycopg://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
    working_dir: /app/backend
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: momonong/neuroai-frontend:latest
    container_name: neuroai_frontend
    ports:
      - "55688:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  neuroai_pg_data:
