version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: neuroai_backend
    ports:
      - "8001:8001"
    volumes:
      # 將本機的 backend 資料夾掛載到容器內，支援熱更新 (--reload)
      - ./backend:/app/backend
      # 將本機的 data 資料夾掛載到容器的上一層，確保後端能正確讀取到 ../data
      - ./data:/app/data
    working_dir: /app/backend
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neuroai_frontend
    ports:
      - "5173:5173"
    volumes:
      # 將本機的 frontend 資料夾掛載進去
      - ./frontend:/app/frontend
      # 忽略本機的 node_modules，使用容器內安裝的版本 (避免 Windows/Linux 衝突)
      - /app/frontend/node_modules
    working_dir: /app/frontend
    environment:
      # 在 Windows 上使用 Docker 時，開啟輪詢以確保檔案修改能觸發前端熱更新
      - CHOKIDAR_USEPOLLING=true 
    # Vite 必須加上 --host 才能讓容器外的瀏覽器連線
    command: npm run dev -- --host 0.0.0.0 
    depends_on:
      - backend