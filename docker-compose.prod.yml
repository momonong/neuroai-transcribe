services:
  llm-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: neuroai_llm
    ports:
      - "8000:8000"
    volumes:
      # 在工作站使用絕對路徑以確保 Docker 穩定讀取
      - /home/cball/hf_models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: -m /models/gemma-3-12b/gemma-3-12b-it-q4_0.gguf -c 8192 -ngl 99 --host 0.0.0.0 --port 8000
    restart: unless-stopped

  db:
    image: postgres:18-alpine
    container_name: neuroai_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - neuroai_pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: momonong/neuroai-backend:${IMAGE_TAG:-latest}
    container_name: neuroai_backend
    expose:
      - "8001"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - RUN_PIPELINE_AFTER_UPLOAD=false
      - DATABASE_URL=postgresql+psycopg://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
    working_dir: /app/backend
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - global-proxy-net

  whisper:
    image: momonong/neuroai-whisper:${IMAGE_TAG:-latest}
    container_name: neuroai_whisper
    expose:
      - "8002"
    volumes:
      - ./data:/app/data
      - whisper_model_cache:/app/models_cache
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - WHISPER_MODEL=large-v3
      - MODEL_CACHE_DIR=/app/models_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  core:
    image: momonong/neuroai-core:${IMAGE_TAG:-latest}
    container_name: neuroai_core
    expose:
      - "8003"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - whisper_model_cache:/app/models_cache
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - WHISPER_SERVICE_URL=http://whisper:8002/transcribe
      - LLM_API_URL=http://neuroai_llm:8000/v1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  frontend:
    image: momonong/neuroai-frontend:${IMAGE_TAG:-latest}
    container_name: neuroai_frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - default
      - global-proxy-net

volumes:
  neuroai_pg_data:
  whisper_model_cache:

networks:
  default:
  global-proxy-net:
    external: true
